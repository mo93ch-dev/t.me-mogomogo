<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ارتباط با ما</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--primary:#009688;
--accent:#00C9A7;
--bg:#f4fffb;
--card:#ffffff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Vazirmatn', sans-serif;
}

body{
background: linear-gradient(135deg,#A8E6CF,#D4FC79,#C8E6C9);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:var(--card);
width:90%;
max-width:400px;
padding:30px 20px;
border-radius:25px;
box-shadow:0 20px 40px rgba(0,0,0,0.15);
text-align:center;
animation:fadeIn 0.8s ease;
}

.card h1{
font-size:22px;
margin-bottom:15px;
color:#333;
}

.card p{
font-size:14px;
color:#666;
margin-bottom:30px;
line-height:1.8;
}

.telegram-btn{
background:linear-gradient(135deg,var(--primary),var(--accent));
color:#fff;
border:none;
padding:15px;
width:100%;
border-radius:50px;
font-size:16px;
font-weight:700;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,150,136,0.4);
transition:0.3s;
}

.telegram-btn:active{
transform:scale(0.96);
box-shadow:0 5px 15px rgba(0,150,136,0.3);
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="card">
<h1>ارتباط با ما</h1>
<p>
برای دریافت پشتیبانی، پیشنهادات یا سوالات خود  
می‌توانید از طریق تلگرام با ما در تماس باشید.
</p>

<button class="telegram-btn" id="contactBtn">
ارتباط از طریق تلگرام
</button>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
const tg = window.Telegram.WebApp;

document.getElementById("contactBtn").addEventListener("click", function(){
    if(tg){
        tg.openTelegramLink("https://t.me/mogomogo");
    } else {
        window.open("https://t.me/mogomogo","_blank");
    }
});
</script>

</body>
</html>
