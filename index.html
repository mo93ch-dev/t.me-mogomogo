<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>آریا پرداخت</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<div onclick="toggleMenu()">☰</div>
<div>آریا پرداخت</div>
<div>
<span class="top-icon account" onclick="window.location.href='https://mo93ch-dev.github.io/esabdaritel'">💼</span>
<img class="top-icon tabtoearn" onclick="window.location.href='https://mo93ch-dev.github.io/gametel'" src="https://cdn.imgurl.ir/uploads/d265288_3187.png">
<img class="top-icon cloud" onclick="openCloud()" src="https://cdn.imgurl.ir/uploads/f730250_3200.png">
</div>
</header>

<div class="main-menu" id="homePage">
<a href="https://mo93ch-dev.github.io/havaletel" class="menu-item"><div class="icon-box"><span>💸</span></div><div class="title">حواله پول</div></a>
<a href="https://mo93ch-dev.github.io/internettel" class="menu-item"><div class="icon-box"><span>🌐</span></div><div class="title">بسته انترنت</div></a>
<a href="https://mo93ch-dev.github.io/credittel" class="menu-item"><div class="icon-box"><span>📱</span></div><div class="title">کریدیت مبایل</div></a>
<a href="https://mo93ch-dev.github.io/mobadiltel" class="menu-item"><div class="icon-box"><span>💱</span></div><div class="title">مبدل واحد پول</div></a>
<a href="#" class="menu-item" onclick="window.location.href='https://t.me/afgcoinnews'"><div class="icon-box"><img class="top-icon telegram" src="https://cdn.imgurl.ir/uploads/x908302_3211.png"></div><div class="title">تلگرام پریمیوم</div></a>
<a href="#" class="menu-item" onclick="window.location.href='https://t.me/afgcoinnews'"><div class="icon-box"><span>💎</span></div><div class="title">الماس IMO</div></a>
<a href="#" class="menu-item" onclick="window.location.href='https://t.me/afgcoinnews'"><div class="icon-box"><span>🎮</span></div><div class="title">یوسی پابجی</div></a>
<a href="#" class="menu-item" onclick="window.location.href='https://t.me/afgcoinnews'"><div class="icon-box"><span>💰</span></div><div class="title">ارز دیجیتال</div></a>
<a href="#" class="menu-item" onclick="window.location.href='https://t.me/afgcoinnews'"><div class="icon-box"><span>👤</span></div><div class="title">ثبت نام صرافان</div></a>
</div>

<div class="sidebar" id="sidebar">
<div class="profile-box">
<img id="profileImg" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="پروفایل" onclick="document.getElementById('fileInput').click();">
<input type="text" id="profileName" placeholder="اسم خود را وارد کنید">
<input type="file" id="fileInput" accept="image/*" style="display:none">
</div>

<button onclick="window.location.href='https://mo93ch-dev.github.io/esabdaritel'">💼 حسابداری</button>
<button onclick="window.location.href='https://mo93ch-dev.github.io/mashinesabtel'">🧮 ماشین حساب</button>
<button onclick="window.location.href='https://mo93ch-dev.github.io/mobadiltel'">💱 مبدل واحد پول</button>

<button id="settingsBtn">⚙️ تنظیمات</button>
<div class="settings-sub" id="settingsSub">
<button onclick="toggleTheme()">🌙 تغییر تم</button>
</div>

<button onclick="window.open('https://t.me/mogomogo','_blank')">📩 پشتیبانی</button>
</div>

<div class="cloud-page" id="cloudPage">
<div class="chat-header">
<span onclick="closeCloud()" style="cursor:pointer;font-weight:700;color:var(--back-color)">← بازگشت</span>
<span>یاداشت های شما</span>
</div>
<div class="chat-body" id="chatBody"></div>
<div class="chat-input"><input type="text" id="msgInput"><button onclick="sendMessage()">ارسال</button></div>
</div>

<!-- زیرنویس متحرک پایین صفحه -->
<div id="bottomNotice">
  <div id="scrollText">⚠️ توجه: تمام خدمات موجود در حال حاضر آزمایشی می‌باشند ⚠️</div>
</div>

<script src="script.js"></script>
</body>
</html>
